<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ultimas desgracias de audax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: #222222;
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 20px;
      line-height: 1.6;
    }

    h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: #1a6b2f;
      border-bottom: 3px solid #c0392b;
      padding-bottom: 10px;
      margin-bottom: 24px;
    }

    /* ── Bloque principal ─────────────────────────────────── */
    #bloque-principal {
      background-color: #f4f9f5;
      border-left: 5px solid #1a6b2f;
      padding: 20px 20px 16px;
      margin-bottom: 16px;
      border-radius: 4px;
    }

    #frase-principal {
      font-family: 'Inter', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 14px;
    }

    #marcador-principal {
      font-family: 'Inter', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: #222222;
      margin: 0 0 4px;
    }

    #estado-principal {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      color: #888888;
      margin: 0;
      letter-spacing: 0.05em;
    }

    /* ── Colores de frase por estado ──────────────────────── */
    .color-ganando    { color: #1a6b2f; }
    .color-empatando  { color: #b07d00; }
    .color-perdiendo  { color: #8b1a1a; }
    .color-ft         { color: #444444; }
    .color-espera     { color: #888888; }
    .color-suspendido { color: #c0392b; }
    .color-sin-datos  { color: #aaaaaa; }

    /* ── Eventos en vivo ──────────────────────────────────── */
    #eventos-vivo {
      margin-top: 14px;
      border-top: 1px solid #d0e8d8;
      padding-top: 10px;
    }

    .eventos-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 2px 6px;
      align-items: baseline;
    }

    .ev-celda { font-family: 'Inter', sans-serif; font-size: 0.8rem; padding: 2px 0; }
    .ev-celda.ev-audax   { text-align: right; color: #1a6b2f; }
    .ev-celda.ev-min-col { text-align: center; font-weight: 700; color: #999999; font-size: 0.72rem; white-space: nowrap; }
    .ev-celda.ev-rival   { text-align: left; color: #8b1a1a; }

    /* ── Partidos recientes ────────────────────────────────── */
    #recientes { margin-bottom: 8px; }

    .partido-reciente {
      border-left: 3px solid #e0e0e0;
      padding: 10px 14px;
      margin-bottom: 8px;
      border-radius: 2px;
    }

    .partido-reciente .frase-rec {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      color: #666666;
      font-style: italic;
      margin: 0 0 3px;
    }

    .partido-reciente .marcador-rec {
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: #444444;
      margin: 0 0 2px;
    }

    .partido-reciente .estado-rec {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      color: #aaaaaa;
      margin: 0;
    }

    /* ── Botón expandir ───────────────────────────────────── */
    #btn-expandir {
      background: none;
      border: 1px solid #dddddd;
      color: #888888;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 4px;
      display: none;
    }

    #btn-expandir:hover { border-color: #aaaaaa; color: #555555; }

    /* ── Tablas de competiciones ──────────────────────────── */
    #tablas-section { margin-top: 36px; }

    .tabla-comp { margin-bottom: 24px; }

    .tabla-comp-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: #999999;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding-bottom: 6px;
      border-bottom: 1px solid #eeeeee;
      user-select: none;
    }

    .tabla-comp-toggle { font-size: 0.68rem; color: #cccccc; display: none; }

    .tabla-comp-body.collapsed { display: none; }

    .tabla-standings {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      margin-top: 6px;
    }

    .tabla-standings th {
      font-weight: 500;
      color: #bbbbbb;
      text-align: right;
      padding: 4px 8px 4px 4px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .tabla-standings th:first-child  { text-align: center; width: 30px; padding-left: 0; }
    .tabla-standings th:nth-child(2) { text-align: left; }

    .tabla-standings td {
      padding: 5px 8px 5px 4px;
      color: #666666;
      text-align: right;
      border-bottom: 1px solid #f5f5f5;
    }

    .tabla-standings td:first-child  { text-align: center; color: #bbbbbb; font-size: 0.75rem; width: 30px; }
    .tabla-standings td:nth-child(2) { text-align: left; color: #444444; }

    .tabla-standings tr.audax-row td {
      font-weight: 600;
      background-color: #f8f9f8;
    }

    .btn-ver-tabla {
      background: none;
      border: none;
      color: #bbbbbb;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      padding: 5px 0;
      cursor: pointer;
      display: inline-block;
      margin-top: 2px;
    }

    .btn-ver-tabla:hover { color: #888888; }

    @media (max-width: 480px) {
      body { padding: 20px 14px; }
      h1   { font-size: 1.25rem; }
      #frase-principal    { font-size: 1.05rem; }
      #marcador-principal { font-size: 1.5rem; }
      .tabla-comp-header  { cursor: pointer; }
      .tabla-comp-toggle  { display: inline; }
    }
  </style>
</head>
<body>
  <h1>ultimas desgracias de audax</h1>

  <div id="bloque-principal">
    <p id="frase-principal" class="color-espera">Cargando datos...</p>
    <p id="marcador-principal"></p>
    <p id="estado-principal"></p>
    <div id="eventos-vivo" style="display:none"></div>
  </div>

  <div id="recientes"></div>
  <button id="btn-expandir">Ver más desgracias</button>

  <div id="tablas-section"></div>

  <script>
    // ── Frases ─────────────────────────────────────────────────────
    var FRASES_ESPERA = [
      'Esperando que estos cracks salgan a la cancha...',
      'Avisen cuando jueguen.',
      'Sufre el fútbol sin el Audax en la cancha...'
    ];

    function fraseEspera() {
      return FRASES_ESPERA[Math.floor(Math.random() * FRASES_ESPERA.length)];
    }

    function frasePartido(partido, esVivo) {
      if (!partido) return { texto: 'No hay datos recientes, les pagan para nada.', clase: 'color-sin-datos' };
      var s = partido.status;
      if (s === 'SUSPENDED' || s === 'CANCELLED') return { texto: 'SUSPENDIDO.', clase: 'color-suspendido' };
      if (esVivo) {
        if (partido.score_audax > partido.score_rival)  return { texto: 'Agarraron la pala.', clase: 'color-ganando' };
        if (partido.score_audax === partido.score_rival) return { texto: 'TIENEN QUE HACER MÁS GOLES QUE EL RIVAL!', clase: 'color-empatando' };
        return { texto: '¿Ganar? ¿para qué?', clase: 'color-perdiendo' };
      } else {
        var r = partido.result;
        if (r === 'Victoria') return { texto: 'Hicieron lo que tenían que hacer, para eso les pagan.', clase: 'color-ft' };
        if (r === 'Empate')   return { texto: 'Empatar también es una decisión.', clase: 'color-ft' };
        if (r === 'Derrota')  return { texto: 'El pasto estaba muy largo.', clase: 'color-ft' };
        return { texto: 'No hay datos recientes, les pagan para nada.', clase: 'color-sin-datos' };
      }
    }

    function marcador(p) {
      return 'Audax ' + p.score_audax + ' – ' + p.score_rival + ' ' + p.rival;
    }

    function estadoTexto(p) {
      if (p.status === 'LIVE') {
        var min = p.elapsed ? p.elapsed + "'" : '';
        return '● en vivo' + (min ? ' · ' + min : '');
      }
      if (p.status === 'FT') return 'FT · ' + p.date;
      return p.status + ' · ' + p.date;
    }

    function parsearFecha(dateStr) {
      if (!dateStr) return null;
      var isoMatch = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (isoMatch) return new Date(parseInt(isoMatch[1]), parseInt(isoMatch[2]) - 1, parseInt(isoMatch[3]));
      var shortMatch = dateStr.match(/(\d{2})-(\d{2})$/);
      if (shortMatch) return new Date(new Date().getFullYear(), parseInt(shortMatch[2]) - 1, parseInt(shortMatch[1]));
      return null;
    }

    function horasDesde(dateStr) {
      var d = parsearFecha(dateStr);
      if (!d) return 999;
      return (Date.now() - d.getTime()) / (1000 * 60 * 60);
    }

    function setFrase(elId, frase) {
      var el = document.getElementById(elId);
      el.className = frase.clase;
      el.textContent = frase.texto;
    }

    // ── Eventos en vivo ────────────────────────────────────────────
    var ICONOS = {
      goal: '⚽', penalty: '⚽ (P)', own_goal: '⚽ (PP)',
      yellow_card: '🟨', red_card: '🟥', substitution: '🔄',
    };

    function textoEvento(e) {
      var icono   = ICONOS[e.type] || '•';
      var jugador = e.player || '—';
      var asist   = (e.type === 'goal' || e.type === 'penalty') && e.assist ? ' (' + e.assist + ')' : '';
      return icono + ' ' + jugador + asist;
    }

    function renderEventos(eventos) {
      var el = document.getElementById('eventos-vivo');
      el.innerHTML = '';
      if (!eventos || eventos.length === 0) { el.style.display = 'none'; return; }

      var relevantes = eventos.filter(function(e) {
        return e.type === 'goal' || e.type === 'penalty' || e.type === 'own_goal' ||
               e.type === 'yellow_card' || e.type === 'red_card';
      });
      if (relevantes.length === 0) { el.style.display = 'none'; return; }

      var filas = [], minMap = {};
      relevantes.forEach(function(e) {
        var key = e.minute + '_' + (e.extra || 0);
        if (!minMap[key]) {
          minMap[key] = { key: key, minute: e.minute, extra: e.extra, audax: [], rival: [] };
          filas.push(minMap[key]);
        }
        if (e.is_audax) minMap[key].audax.push(e);
        else            minMap[key].rival.push(e);
      });

      var grid = document.createElement('div');
      grid.className = 'eventos-grid';

      filas.reverse().forEach(function(fila) {
        var minStr = fila.extra ? fila.minute + '+' + fila.extra + "'" : fila.minute + "'";
        var n = Math.max(fila.audax.length, fila.rival.length);
        for (var i = 0; i < n; i++) {
          var cA = document.createElement('div');
          cA.className = 'ev-celda ' + (fila.audax[i] ? 'ev-audax' : 'ev-vacia');
          if (fila.audax[i]) cA.textContent = textoEvento(fila.audax[i]);

          var cM = document.createElement('div');
          cM.className = 'ev-celda ev-min-col';
          cM.textContent = i === 0 ? minStr : '';

          var cR = document.createElement('div');
          cR.className = 'ev-celda ' + (fila.rival[i] ? 'ev-rival' : 'ev-vacia');
          if (fila.rival[i]) cR.textContent = textoEvento(fila.rival[i]);

          grid.appendChild(cA);
          grid.appendChild(cM);
          grid.appendChild(cR);
        }
      });

      el.appendChild(grid);
      el.style.display = 'block';
    }

    function crearBloqueReciente(partido) {
      var f = frasePartido(partido, false);
      var div = document.createElement('div');
      div.className = 'partido-reciente';
      div.innerHTML =
        '<p class="frase-rec">' + f.texto + '</p>' +
        '<p class="marcador-rec">' + marcador(partido) + '</p>' +
        '<p class="estado-rec">' + estadoTexto(partido) + '</p>';
      return div;
    }

    // ── Tablas de competiciones ────────────────────────────────────
    function renderTablas(data) {
      var section = document.getElementById('tablas-section');
      section.innerHTML = '';

      var standings = data.standings;
      if (!standings || !Array.isArray(standings) || standings.length === 0) return;

      var validas = standings.filter(function(s) {
        return s && s.competition && s.table && s.table.length > 0;
      });
      if (validas.length === 0) return;

      validas.sort(function(a, b) {
        return (b.last_match_date || '').localeCompare(a.last_match_date || '');
      });

      var esMobile = window.innerWidth <= 480;

      validas.forEach(function(comp) {
        var compDiv = document.createElement('div');
        compDiv.className = 'tabla-comp';

        var header = document.createElement('div');
        header.className = 'tabla-comp-header';
        var titulo = document.createElement('span');
        titulo.textContent = comp.competition;
        var toggle = document.createElement('span');
        toggle.className = 'tabla-comp-toggle';
        toggle.textContent = '▼';
        header.appendChild(titulo);
        header.appendChild(toggle);

        var body = document.createElement('div');
        body.className = 'tabla-comp-body' + (esMobile ? ' collapsed' : '');

        if (esMobile) {
          header.addEventListener('click', function() {
            var cerrado = body.classList.contains('collapsed');
            body.classList.toggle('collapsed');
            toggle.textContent = cerrado ? '▲' : '▼';
          });
        }

        var tabla = comp.table;
        var audaxIdx = -1;
        tabla.forEach(function(r, i) { if (r.is_audax) audaxIdx = i; });

        var start   = audaxIdx === -1 ? 0 : Math.max(0, audaxIdx - 3);
        var end     = audaxIdx === -1 ? Math.min(7, tabla.length) : Math.min(tabla.length, audaxIdx + 4);
        var preview = tabla.slice(start, end);
        var expandidaTabla = false;

        function construirTabla(filas) {
          var t = document.createElement('table');
          t.className = 'tabla-standings';
          var hrow = t.createTHead().insertRow();
          ['Pos', 'Equipo', 'J', 'PTS', 'DG'].forEach(function(col) {
            var th = document.createElement('th');
            th.textContent = col;
            hrow.appendChild(th);
          });
          var tbody = t.createTBody();
          filas.forEach(function(r) {
            var tr = tbody.insertRow();
            if (r.is_audax) tr.className = 'audax-row';
            var dg = (r.gd >= 0 ? '+' : '') + r.gd;
            [r.pos, r.team, r.pj, r.pts, dg].forEach(function(val) {
              tr.insertCell().textContent = val;
            });
          });
          return t;
        }

        var tableEl = construirTabla(preview);
        body.appendChild(tableEl);

        if (tabla.length > preview.length) {
          var btn = document.createElement('button');
          btn.className = 'btn-ver-tabla';
          btn.textContent = 'Ver tabla completa';
          btn.onclick = function() {
            expandidaTabla = !expandidaTabla;
            body.removeChild(tableEl);
            tableEl = construirTabla(expandidaTabla ? tabla : preview);
            body.insertBefore(tableEl, btn);
            btn.textContent = expandidaTabla ? 'Ver menos' : 'Ver tabla completa';
          };
          body.appendChild(btn);
        }

        compDiv.appendChild(header);
        compDiv.appendChild(body);
        section.appendChild(compDiv);
      });
    }

    // ── Renderizar datos ───────────────────────────────────────────
    function renderDatos(data) {
      document.getElementById('recientes').innerHTML = '';

      var esVivo   = !!data.live;
      var ultimo   = data.last;
      var anterior = data.previous;

      var ftList = [];
      if (ultimo)   ftList.push(ultimo);
      if (anterior) ftList.push(anterior);
      if (data.history && Array.isArray(data.history)) {
        data.history.forEach(function(p) { if (ftList.length < 10) ftList.push(p); });
      }

      // ── Bloque principal ──
      if (esVivo) {
        var f = frasePartido(data.live, true);
        setFrase('frase-principal', f);
        document.getElementById('marcador-principal').textContent = marcador(data.live);
        document.getElementById('estado-principal').textContent   = estadoTexto(data.live);
        renderEventos(data.live.events);
      } else if (ultimo) {
        var horas = horasDesde(ultimo.date);
        if (horas <= 12) {
          var f2 = frasePartido(ultimo, false);
          setFrase('frase-principal', f2);
          document.getElementById('marcador-principal').textContent = marcador(ultimo);
          document.getElementById('estado-principal').textContent   = estadoTexto(ultimo);
          ftList = ftList.slice(1);
        } else {
          setFrase('frase-principal', { texto: fraseEspera(), clase: 'color-espera' });
          document.getElementById('marcador-principal').textContent = '';
          document.getElementById('estado-principal').textContent   = '';
        }
      } else {
        setFrase('frase-principal', { texto: '¿De qué se cansan como para tener vacaciones?', clase: 'color-espera' });
        document.getElementById('marcador-principal').textContent = '';
        document.getElementById('estado-principal').textContent   = '';
      }

      // ── Partidos recientes ──
      var recientesEl     = document.getElementById('recientes');
      var btnExpandir     = document.getElementById('btn-expandir');
      var VISIBLE_DEFAULT = esVivo ? 1 : 2;
      var expandido       = false;

      ftList.forEach(function(p) { recientesEl.appendChild(crearBloqueReciente(p)); });

      function actualizarVista() {
        var bloques = recientesEl.querySelectorAll('.partido-reciente');
        var limite  = expandido ? 10 : VISIBLE_DEFAULT;
        bloques.forEach(function(el, i) { el.style.display = i < limite ? '' : 'none'; });
        if (ftList.length > VISIBLE_DEFAULT) {
          btnExpandir.style.display = 'inline-block';
          btnExpandir.textContent   = expandido ? 'Ver menos' : 'Ver más desgracias';
        } else {
          btnExpandir.style.display = 'none';
        }
      }

      actualizarVista();

      btnExpandir.onclick = function() {
        expandido = !expandido;
        actualizarVista();
      };

      renderTablas(data);
    }

    // ── Cargar latest.json ─────────────────────────────────────────
    var HORA_INICIO = 12;
    var HORA_FIN    = 22;

    function enHorarioActivo() {
      var h = new Date().getHours();
      return h >= HORA_INICIO && h < HORA_FIN;
    }

    function cargarDatos() {
      fetch('data/latest.json?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(data) {
          renderDatos(data);
          if (!enHorarioActivo()) return;
          var intervalo = data.live ? 120000 : 900000;
          setTimeout(cargarDatos, intervalo);
        })
        .catch(function() {
          setFrase('frase-principal', { texto: 'No hay datos recientes, les pagan para nada.', clase: 'color-sin-datos' });
          document.getElementById('marcador-principal').textContent = '';
          document.getElementById('estado-principal').textContent   = '';
        });
    }

    cargarDatos();
  </script>
</body>
</html>
